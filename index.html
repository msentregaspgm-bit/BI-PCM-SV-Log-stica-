<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PCM SV</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #005697; --yellow: #FDB813; }
        body { font-family: sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--blue); color: white; display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; }
        .container { max-width: 1200px; margin: auto; display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        .value { font-size: 2rem; font-weight: bold; color: var(--blue); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        #error-msg { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 8px; display: none; margin-bottom: 20px; border: 1px solid #f87171; }
    </style>
</head>
<body>

<div id="loader">CARREGANDO DADOS SV LOGÍSTICA...</div>

<div class="container" id="app">
    <div id="error-msg"></div>
    <div class="card" style="border-left: 10px solid var(--yellow); text-align: left;">
        <h2 style="margin: 0; color: var(--blue);">BI PCM - CONTROLE DE FROTA</h2>
    </div>

    <div class="grid">
        <div class="card"><h3>Total OS</h3><div id="vTotal" class="value">0</div></div>
        <div class="card"><h3>OS Abertas</h3><div id="vAbertas" class="value" style="color:red">0</div></div>
        <div class="card"><h3>Investimento Peças</h3><div id="vCusto" class="value" style="color:green">R$ 0</div></div>
    </div>

    <div class="grid" style="margin-top: 20px;">
        <div class="card"><h4>Falhas por Sistema</h4><canvas id="chartSist"></canvas></div>
        <div class="card"><h4>Mix de Manutenção</h4><canvas id="chartMix"></canvas></div>
    </div>
</div>

<script>
    // ⚠️ COLOQUE SEU LINK DO GOOGLE ABAIXO
    const URL_API = "https://script.google.com/macros/s/AKfycbxe8I8JWXC7u7tgOrctDSQS8tvphLVLpaAyw6G5xdmCn6OwlJmo1-a-I4nL41XlXX8QwQ/exec";

    async function start() {
        try {
            const res = await fetch(URL_API);
            const text = await res.text();

            if (text.trim().startsWith("<")) {
                throw new Error("O Google bloqueou o acesso. Verifique se a implantação está como 'Qualquer Pessoa'.");
            }

            const data = JSON.parse(text);
            render(data);
            document.getElementById('app').style.display = 'block';
        } catch (e) {
            const err = document.getElementById('error-msg');
            err.style.display = 'block';
            err.innerHTML = "<b>Erro:</b> " + e.message;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function render(dados) {
        // Usa os nomes exatos das suas colunas (conforme sua planilha CSV)
        const total = dados.length;
        const abertas = dados.filter(o => String(o['Status']).toLowerCase() === 'aberta').length;
        const custo = dados.reduce((acc, o) => acc + (Number(o['Produtos']) || 0), 0);

        document.getElementById('vTotal').innerText = total;
        document.getElementById('vAbertas').innerText = abertas;
        document.getElementById('vCusto').innerText = custo.toLocaleString('pt-br', {style:'currency', currency:'BRL'});

        // Gráfico Sistemas
        const sMap = {}; 
        dados.forEach(o => { const s = o['Sistema'] || "Outros"; sMap[s] = (sMap[s] || 0) + 1; });
        const labels = Object.entries(sMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
        new Chart(document.getElementById('chartSist'), {
            type: 'bar', 
            data: { labels: labels.map(l=>l[0]), datasets:[{label:'OS', data:labels.map(l=>l[1]), backgroundColor:'#005697'}] },
            options: { indexAxis: 'y' }
        });

        // Gráfico Mix
        const tMap = {}; 
        dados.forEach(o => { const t = o['Manutenção'] || "Outros"; tMap[t] = (tMap[t] || 0) + 1; });
        new Chart(document.getElementById('chartMix'), {
            type: 'pie',
            data: { labels: Object.keys(tMap), datasets:[{data: Object.values(tMap), backgroundColor:['#005697','#FDB813','#ef4444','#10b981']}] }
        });
    }

    start();
</script>
</body>
</html>
