<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI PCM - SV Logística</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sv-blue: #002D5E; --sv-yellow: #FFD700; --bg: #F0F2F5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        #splash { position: fixed; width: 100%; height: 100%; background: var(--sv-blue); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        #splash h1 { color: white; font-size: 40px; border-bottom: 3px solid var(--sv-yellow); padding-bottom: 10px; }

        .navbar { background: var(--sv-blue); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .main { padding: 25px; max-width: 1600px; margin: auto; }

        /* Filtros */
        .filter-section { background: white; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: flex; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-wrap: wrap; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; min-width: 180px; font-weight: bold; }

        /* KPI Balões */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-top: 6px solid var(--sv-blue); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .kpi-card h3 { margin: 0; font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-card .value { font-size: 28px; font-weight: 800; color: var(--sv-blue); margin: 10px 0; }

        /* Grid de Gráficos */
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 25px; }
        .chart-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .chart-card h4 { margin: 0 0 20px 0; color: var(--sv-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; font-size: 15px; text-transform: uppercase; }
        
        .canvas-wrapper { position: relative; height: 350px; width: 100%; }
    </style>
</head>
<body>

<div id="splash"><h1>SV LOGÍSTICA</h1><p style="color:white">SINCRONIZANDO PCM...</p></div>

<div class="navbar">
    <h2 style="margin:0">PCM INTELLIGENCE</h2>
    <button onclick="location.reload()" style="background:var(--sv-yellow); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">ATUALIZAR BI</button>
</div>

<div class="main">
    <div class="filter-section">
        <input type="month" id="fData" onchange="updateDashboard()">
        <select id="fManut" onchange="updateDashboard()">
            <option value="">Manutenção: Todas</option>
            <option value="Corretiva">Corretiva</option>
            <option value="Preventiva">Preventiva</option>
        </select>
        <select id="fStatus" onchange="updateDashboard()">
            <option value="">Status: Todos</option>
            <option value="Finalizada">Finalizada</option>
            <option value="Aberta">Aberta</option>
        </select>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>Total Ordens</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card"><h3>Abertas</h3><div class="value" id="kAbertas" style="color:#d32f2f">0</div></div>
        <div class="kpi-card"><h3>Fechadas</h3><div class="value" id="kFechadas" style="color:#2e7d32">0</div></div>
        <div class="kpi-card"><h3>Custo Peças</h3><div class="value" id="kCusto">R$ 0</div></div>
        <div class="kpi-card"><h3>Total HH</h3><div class="value" id="kHH">0</div></div>
    </div>

    <div class="charts-container">
        <div class="chart-card"><h4>HH por Sistema</h4><div class="canvas-wrapper"><canvas id="cHH"></canvas></div></div>
        <div class="chart-card"><h4>Prioridade das OCs</h4><div class="canvas-wrapper"><canvas id="cPrio"></canvas></div></div>
        <div class="chart-card"><h4>Top 10 Equipamentos</h4><div class="canvas-wrapper"><canvas id="cEquip"></canvas></div></div>
        <div class="chart-card"><h4>HH por Centro de Custo</h4><div class="canvas-wrapper"><canvas id="cHHCC"></canvas></div></div>
        <div class="chart-card" style="grid-column: span 1;"><h4>% OS por Sistema</h4><div class="canvas-wrapper"><canvas id="cPizza"></canvas></div></div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbw3KtT6XvIJ_exSmcnPwymZpzkfK78ozcnXY5N0BhCyGo6PW_fvvQOn-ddCqqzo8TwTmQ/exec";
    let rawData = [];
    let charts = {};

    async function init() {
        try {
            const res = await fetch(URL_API);
            rawData = await res.json();
            document.getElementById('splash').style.display = 'none';
            updateDashboard();
        } catch (e) { console.error(e); }
    }

    function updateDashboard() {
        const valData = document.getElementById('fData').value;
        const valManut = document.getElementById('fManut').value;
        const valStatus = document.getElementById('fStatus').value;

        const data = rawData.filter(d => {
            let dateMatch = valData ? String(d.data_e_hora_de_inicio).includes(valData) : true;
            let manutMatch = valManut ? d.manutencao === valManut : true;
            let statusMatch = valStatus ? d.status === valStatus : true;
            return dateMatch && manutMatch && statusMatch;
        });

        document.getElementById('kTotal').innerText = data.length;
        document.getElementById('kAbertas').innerText = data.filter(d => d.status === 'Aberta').length;
        document.getElementById('kFechadas').innerText = data.filter(d => d.status === 'Finalizada').length;
        
        const custo = data.reduce((acc, d) => acc + (d.produtos || 0), 0);
        const hh = data.reduce((acc, d) => acc + (d.hh || 0), 0);
        
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
        document.getElementById('kHH').innerText = hh.toFixed(1) + " hrs";

        renderCharts(data);
    }

    function renderCharts(data) {
        Object.values(charts).forEach(c => c.destroy());

        // Gráfico HH Sistema (Vertical + Sort)
        const sistSum = sumAndSort(data, "sistema", "hh");
        charts.cHH = new Chart(document.getElementById('cHH'), {
            type: 'bar',
            data: { labels: sistSum.labels, datasets: [{ label: 'Horas', data: sistSum.values, backgroundColor: '#005697' }] },
            options: { maintainAspectRatio: false }
        });

        // Prioridade (Horizontal)
        const prioCount = countAndSort(data, "prioridade");
        charts.cPrio = new Chart(document.getElementById('cPrio'), {
            type: 'bar',
            options: { indexAxis: 'y', maintainAspectRatio: false },
            data: { labels: prioCount.labels, datasets: [{ label: 'Qtd', data: prioCount.values, backgroundColor: '#FFD700' }] }
        });

        // Top 10 Equipamentos
        const equipCount = countAndSort(data, "cod_sec_veiculo", 10);
        charts.cEquip = new Chart(document.getElementById('cEquip'), {
            type: 'bar',
            options: { indexAxis: 'y', maintainAspectRatio: false, scales: { y: { ticks: { font: { size: 10 } } } } },
            data: { labels: equipCount.labels, datasets: [{ label: 'Ordens', data: equipCount.values, backgroundColor: '#002D5E' }] }
        });

        // HH por Centro de Custo
        const ccHH = sumAndSort(data, "centro_resultado", "hh");
        charts.cHHCC = new Chart(document.getElementById('cHHCC'), {
            type: 'bar',
            options: { indexAxis: 'y', maintainAspectRatio: false },
            data: { labels: ccHH.labels, datasets: [{ label: 'HH', data: ccHH.values, backgroundColor: '#005697' }] }
        });

        // % Sistemas (Pizza)
        const sistPizza = countAndSort(data, "sistema");
        charts.cPizza = new Chart(document.getElementById('cPizza'), {
            type: 'pie',
            data: { labels: sistPizza.labels, datasets: [{ data: sistPizza.values, backgroundColor: ['#002D5E', '#005697', '#FFD700', '#e74c3c', '#2ecc71'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
        });
    }

    function sumAndSort(arr, key, sumKey) {
        const map = arr.reduce((acc, d) => {
            const k = d[key] || "Outros";
            acc[k] = (acc[k] || 0) + (d[sumKey] || 0);
            return acc;
        }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    function countAndSort(arr, key, limit = 99) {
        const map = arr.reduce((acc, d) => {
            const k = d[key] || "Outros";
            acc[k] = (acc[k] || 0) + 1;
            return acc;
        }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, limit);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    init();
</script>
</body>
</html>
