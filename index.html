<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BI PCM SV MASTER - RESTAURADO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --sv-blue-dark: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue-dark); color: var(--sv-text); margin: 0; padding: 0; overflow-x: hidden; }

        /* Splash */
        #splash { position: fixed; width: 100%; height: 100%; background: var(--sv-blue-dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #splash img { width: 180px; }

        /* Navbar fixa igual ao index(2) */
        .navbar { background: var(--sv-blue-mid); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--sv-yellow); position: sticky; top: 0; z-index: 999; }
        .navbar img { height: 35px; }
        .navbar h2 { font-size: 14px; margin: 0; color: var(--sv-yellow); }

        .main { padding: 10px; max-width: 1600px; margin: auto; }
        
        /* Filtros index(2) */
        .filter-section { background: var(--sv-blue-mid); padding: 12px; border-radius: 10px; margin-bottom: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; border: 1px solid rgba(255,255,255,0.1); }
        select, input { background: #001d3d; color: white; border: 1px solid var(--sv-yellow); padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; }

        /* KPIs index(2) */
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        @media (min-width: 768px) { .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); } }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); }
        .kpi-card h3 { margin: 0; font-size: 9px; color: var(--sv-yellow); text-transform: uppercase; }
        .kpi-card .value { font-size: 16px; font-weight: 800; margin: 5px 0; color: white; }

        /* Gráficos index(2) + Seletores OC/OP */
        .charts-container { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 992px) { .charts-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        .chart-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        .chart-header h4 { margin: 0; color: var(--sv-yellow); font-size: 11px; text-transform: uppercase; }
        
        .drill-selectors { display: flex; gap: 2px; background: #001d3d; padding: 2px; border-radius: 6px; }
        .drill-btn { background: none; border: none; color: #888; padding: 4px 8px; font-size: 8px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .drill-btn.active { background: var(--sv-yellow); color: #001d3d; }

        .canvas-wrapper { position: relative; height: 280px; width: 100%; }

        /* Modal Dril-down */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; padding: 10px; overflow-y: auto; }
        .modal-content { background: white; color: #333; border-radius: 10px; padding: 15px; width: 100%; max-width: 900px; margin: auto; }
        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div id="splash"><img src="Logo.png" alt="SV Logística"></div>

<div class="navbar"><img src="Logo.png"><h2>PCM MASTER</h2></div>

<div class="main" id="pdfArea">
    <div class="filter-section">
        <input type="month" id="fData" onchange="updateDashboard()">
        <select id="fManut" onchange="updateDashboard()"><option value="">Manutenções</option><option value="Corretiva">Corretiva</option><option value="Preventiva">Preventiva</option></select>
        <select id="fStatus" onchange="updateDashboard()"><option value="">Status</option><option value="Finalizada">Finalizadas</option><option value="Aberta">Abertas</option></select>
        <button style="background:#27ae60; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;" onclick="exportPDF()">PDF</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>TOTAL OS</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card"><h3>ABERTAS</h3><div class="value" id="kAbertas" style="color:#ff4d4d">0</div></div>
        <div class="kpi-card"><h3>FECHADAS</h3><div class="value" id="kFechadas" style="color:#00ff88">0</div></div>
        <div class="kpi-card"><h3>CUSTO PEÇAS</h3><div class="value" id="kCusto">R$ 0</div></div>
        <div class="kpi-card"><h3>TOTAL HH</h3><div class="value" id="kHH">0h</div></div>
        <div class="kpi-card"><h3>MÉDIA/OS</h3><div class="value" id="kAvg">R$ 0</div></div>
        <div class="kpi-card"><h3>CUSTO/HH</h3><div class="value" id="kHHVal" style="color:#4CC9F0">R$ 0</div></div>
    </div>

    <div class="charts-container">
        <div class="chart-card">
            <div class="chart-header">
                <h4>Pareto: Volume OS / Sistema</h4>
                <div class="drill-selectors">
                    <button class="drill-btn active" onclick="setDrillMode(this, 'oc')">OC</button>
                    <button class="drill-btn" onclick="setDrillMode(this, 'op')">Operação</button>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="cPareto"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <h4>HH Acumulado / Sistema</h4>
                <div class="drill-selectors">
                    <button class="drill-btn active" onclick="setDrillMode(this, 'oc')">OC</button>
                    <button class="drill-btn" onclick="setDrillMode(this, 'op')">Operação</button>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="cHH"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <h4>Top 10 Freq. Equipamento</h4>
                <div class="drill-selectors">
                    <button class="drill-btn active" onclick="setDrillMode(this, 'oc')">OC</button>
                    <button class="drill-btn" onclick="setDrillMode(this, 'op')">Operação</button>
                </div>
            </div>
            <div class="canvas-wrapper"><canvas id="cEquipFreq"></canvas></div>
        </div>

        <div class="chart-card">
            <div class="chart-header"><h4>Distribuição % Sistemas</h4></div>
            <div class="canvas-wrapper"><canvas id="cPizza"></canvas></div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <button onclick="closeModal()" style="float:right; background:red; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">X</button>
        <h3 id="modalTitle">DETALHES</h3>
        <div id="modalChart" style="display:none; height:350px;"><canvas id="cPopUp"></canvas></div>
        <div id="modalTable" class="table-responsive">
            <table><thead><tr><th>OS</th><th>Data</th><th>Prefixo</th><th>Sistema</th><th>Valor</th><th>HH</th><th>Operação</th></tr></thead><tbody id="modalBody"></tbody></table>
        </div>
    </div>
</div>

<script>
    // URLs DEFINITIVAS
    const URL_BI = "https://script.google.com/macros/s/AKfycbyvjdFWktvrqmuWfYSsuc5_qQ8Qx0JcWDKkrE-Z3Fi5Bd2WR-4-HgCNSR1tfE1bil4_GQ/exec";
    const KEY_OP = "Descrição (Centros de Resultado)";

    let rawBI = [], charts = {}, drillMode = 'oc';
    Chart.register(ChartDataLabels);

    window.onload = async () => {
        try {
            const res = await fetch(URL_BI);
            rawBI = await res.json();
            document.getElementById('splash').style.display = 'none';
            updateDashboard();
        } catch (e) { alert("Erro ao carregar dados!"); }
    };

    function setDrillMode(btn, mode) {
        btn.parentElement.querySelectorAll('.drill-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); drillMode = mode;
    }

    function updateDashboard() {
        const fD = document.getElementById('fData').value, fM = document.getElementById('fManut').value, fS = document.getElementById('fStatus').value;
        const data = rawBI.filter(d => (fD ? String(d.data_e_hora_de_inicio).includes(fD) : true) && (fM ? d.manutencao === fM : true) && (fS ? d.status === fS : true));
        
        document.getElementById('kTotal').innerText = data.length;
        document.getElementById('kAbertas').innerText = data.filter(x => x.status === 'Aberta').length;
        document.getElementById('kFechadas').innerText = data.filter(x => x.status === 'Finalizada').length;
        const custo = data.reduce((a, b) => a + (b.produtos || 0), 0);
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br', {style:'currency', currency:'BRL', maximumFractionDigits:0});
        const hh = data.reduce((a, b) => a + (b.hh || 0), 0);
        document.getElementById('kHH').innerText = Math.round(hh) + "h";
        document.getElementById('kAvg').innerText = (custo/data.length || 0).toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});
        document.getElementById('kHHVal').innerText = (custo/hh || 0).toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});

        renderCharts(data);
    }

    function renderCharts(data) {
        const ids = ['cPareto','cHH','cEquipFreq','cPizza'];
        ids.forEach(id => { if(charts[id]) charts[id].destroy(); });

        const cfg = () => ({
            maintainAspectRatio: false,
            plugins: { datalabels: { color: '#fff', font:{weight:'bold', size:9}, anchor: 'end', align: 'top', formatter: Math.round }, legend:{display:false} },
            onClick: (e, activeEls) => { if(activeEls.length > 0) handleDrill(data, e.chart.data.labels[activeEls[0].index]); },
            scales: { y: { ticks: { color: '#aaa', font:{size:9}} }, x: { ticks: { color: '#fff', font:{size:9}} } }
        });

        charts.cPareto = new Chart(document.getElementById('cPareto'), { type:'bar', data:{ labels:sort(data,"sistema","count").l, datasets:[{data:sort(data,"sistema","count").v, backgroundColor:'#FFD60A'}] }, options:cfg() });
        charts.cHH = new Chart(document.getElementById('cHH'), { type:'bar', data:{ labels:sort(data,"sistema","sum","hh").l, datasets:[{data:sort(data,"sistema","sum","hh").v, backgroundColor:'#00A8E8'}] }, options:cfg() });
        charts.cEquipFreq = new Chart(document.getElementById('cEquipFreq'), { type:'bar', data:{ labels:sort(data,"cod_sec_veiculo","count",null,10).l, datasets:[{data:sort(data,"cod_sec_veiculo","count",null,10).v, backgroundColor:'#4CC9F0'}] }, options:{...cfg(), indexAxis:'y'} });
        
        const pz = processPizza(data, "sistema");
        charts.cPizza = new Chart(document.getElementById('cPizza'), { type:'pie', data:{ labels:pz.l, datasets:[{data:pz.v, backgroundColor:['#FFD60A','#00A8E8','#4CC9F0','#7209B7','#F72585']}] }, options:{ maintainAspectRatio:false, plugins:{ legend:{position:'right',labels:{color:'#fff', font:{size:8}}}, datalabels:{color:'#fff', font:{weight:'bold'}} } } });
    }

    function handleDrill(data, label) {
        const sub = data.filter(d => d.sistema === label || d.cod_sec_veiculo === label || d[KEY_OP] === label);
        document.getElementById('modalTitle').innerText = label;
        if (drillMode === 'oc') {
            document.getElementById('modalChart').style.display = 'none';
            document.getElementById('modalTable').style.display = 'block';
            document.getElementById('modalBody').innerHTML = sub.map(d => `<tr><td>${d.nro_ordem_servico}</td><td>${d.data_e_hora_de_inicio}</td><td>${d.cod_sec_veiculo}</td><td>${d.sistema}</td><td>R$ ${Math.round(d.produtos)}</td><td>${Math.round(d.hh)}h</td><td>${d[KEY_OP] || 'N/A'}</td></tr>`).join('');
        } else {
            document.getElementById('modalTable').style.display = 'none';
            document.getElementById('modalChart').style.display = 'block';
            if(charts.cPopUp) charts.cPopUp.destroy();
            const popD = sort(sub, KEY_OP, "count");
            charts.cPopUp = new Chart(document.getElementById('cPopUp'), { type: 'pie', data: { labels: popD.l, datasets: [{ data: popD.v, backgroundColor: ['#FFD60A','#4CC9F0','#22C55E','#F72585'] }] }, options: { maintainAspectRatio: false, plugins: { datalabels: { color: '#fff', font:{weight:'bold'} }, legend: { position: 'bottom', labels:{color:'#333'} } } } });
        }
        document.getElementById('modal').style.display = 'block';
    }

    function processPizza(arr, key) {
        const m = arr.reduce((acc, d) => { const x = d[key] || "N/A"; acc[x] = (acc[x] || 0) + 1; return acc; }, {});
        const total = Object.values(m).reduce((a, b) => a + b, 0);
        let others = 0, finalL = [], finalV = [];
        Object.entries(m).forEach(([lbl, val]) => { if ((val / total) < 0.20) others += val; else { finalL.push(lbl); finalV.push(val); } });
        if (others > 0) { finalL.push("Outros"); finalV.push(others); }
        return { l: finalL, v: finalV };
    }

    function sort(arr, k, type, sK, l=99) {
        const m = arr.reduce((acc, d) => { const x = d[k] || "N/A"; acc[x] = (acc[x] || 0) + (type==="sum" ? (d[sK]||0) : 1); return acc; }, {});
        const sorted = Object.entries(m).sort((a,b) => b[1] - a[1]).slice(0, l);
        return { l: sorted.map(x=>x[0]), v: sorted.map(x=>x[1]) };
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function exportPDF() { html2pdf().from(document.getElementById('pdfArea')).set({ margin:2, filename:'BI_SV.pdf', html2canvas:{scale:2}, jsPDF:{orientation:'landscape'} }).save(); }
</script>
</body>
</html>
