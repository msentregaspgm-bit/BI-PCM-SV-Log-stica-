<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BI PCM SV - Master v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --sv-blue-dark: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue-dark); color: var(--sv-text); margin: 0; padding: 0; }

        /* Animação de Entrada Profissional */
        #splash { position: fixed; width: 100%; height: 100%; background: var(--sv-blue-dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1s ease-in-out; }
        #splash img { width: 180px; animation: slideUp 1s ease-out, pulse 2s infinite 1s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .navbar { background: var(--sv-blue-mid); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--sv-yellow); position: sticky; top: 0; z-index: 999; }
        .navbar img { height: 40px; }

        .main { padding: 15px; max-width: 1600px; margin: auto; }
        .filter-section { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; border: 1px solid rgba(255,255,255,0.1); }
        select, input { background: #001d3d; color: white; border: 1px solid var(--sv-yellow); padding: 8px; border-radius: 6px; font-size: 14px; }

        .btn-export { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .kpi-card:hover { transform: scale(1.03); border-color: var(--sv-yellow); }
        .kpi-card h3 { margin: 0; font-size: 10px; color: var(--sv-yellow); text-transform: uppercase; }
        .kpi-card .value { font-size: 18px; font-weight: 800; margin: 8px 0; color: white; }

        /* Gráficos */
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .chart-card { background: var(--sv-blue-mid); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .chart-card h4 { margin: 0 0 15px 0; color: var(--sv-yellow); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .canvas-wrapper { position: relative; height: 280px; width: 100%; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; padding: 10px; overflow-y: auto; }
        .modal-content { background: white; color: #333; border-radius: 12px; padding: 20px; max-width: 1200px; margin: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background: #eee; position: sticky; top: 0; }
    </style>
</head>
<body>

<div id="splash"><img src="Logo.png" alt="SV Logística"></div>

<div id="modal">
    <div class="modal-content">
        <button onclick="closeModal()" style="float:right; padding: 10px; background:red; color:white; border:none; border-radius:5px;">FECHAR</button>
        <h2 id="modalTitle">Detalhamento</h2>
        <div style="overflow-x:auto;"><table id="tableOS"><thead><tr><th>OS</th><th>Data</th><th>Prefixo</th><th>Sistema</th><th>Custo</th><th>HH</th><th>Status</th></tr></thead><tbody id="modalBody"></tbody></table></div>
    </div>
</div>

<div class="navbar"><img src="Logo.png" alt="SV Logística"><h2>PCM MASTER v3.0</h2></div>

<div class="main" id="reportArea">
    <div class="filter-section">
        <input type="month" id="fData" onchange="updateDashboard()">
        <select id="fManut" onchange="updateDashboard()"><option value="">Manutenção: Todas</option><option value="Corretiva">Corretiva</option><option value="Preventiva">Preventiva</option></select>
        <button class="btn-export" onclick="exportPDF()">GERAR PDF</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>Total OS</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card"><h3>Fechadas</h3><div class="value" id="kFechadas" style="color:#00ff88">0</div></div>
        <div class="kpi-card"><h3>Custo Peças</h3><div class="value" id="kCusto">R$ 0</div></div>
        <div class="kpi-card"><h3>Total HH</h3><div class="value" id="kHH">0h</div></div>
        <div class="kpi-card"><h3>Média/OS</h3><div class="value" id="kAvg">R$ 0</div></div>
        <div class="kpi-card"><h3>Custo/HH</h3><div class="value" id="kHHVal" style="color:#4CC9F0">R$ 0</div></div>
    </div>

    <div class="charts-container">
        <div class="chart-card"><h4>Pareto: OS por Sistema</h4><div class="canvas-wrapper"><canvas id="cPareto"></canvas></div></div>
        <div class="chart-card"><h4>HH Acumulado por Sistema</h4><div class="canvas-wrapper"><canvas id="cHH"></canvas></div></div>
        <div class="chart-card"><h4>Top 10 Custo por Equipamento</h4><div class="canvas-wrapper"><canvas id="cCustoEquip"></canvas></div></div>
        <div class="chart-card"><h4>Tendência Mensal: Volume OS</h4><div class="canvas-wrapper"><canvas id="cTrend"></canvas></div></div>
        <div class="chart-card"><h4>Top 10 Frequência por Equipamento</h4><div class="canvas-wrapper"><canvas id="cEquip"></canvas></div></div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyzjdFWktvrqmuWfYSsuc5_qQ8Qx0JcWDKkrE-Z3Fi5Bd2WR-4-HgCNSR1tfE1bil4_GQ/exec";
    let rawData = [];
    let charts = {};

    Chart.register(ChartDataLabels);

    async function init() {
        try {
            const res = await fetch(URL_API);
            rawData = await res.json();
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => document.getElementById('splash').style.display = 'none', 1000);
            }, 1500);
            updateDashboard();
        } catch (e) { alert("Erro ao carregar dados."); }
    }

    function updateDashboard() {
        const valData = document.getElementById('fData').value;
        const valManut = document.getElementById('fManut').value;

        const filtered = rawData.filter(d => {
            let dMatch = valData ? String(d.data_e_hora_de_inicio).includes(valData) : true;
            let mMatch = valManut ? d.manutencao === valManut : true;
            return dMatch && mMatch;
        });

        const total = filtered.length;
        const custo = filtered.reduce((acc, d) => acc + (d.produtos || 0), 0);
        const hh = filtered.reduce((acc, d) => acc + (d.hh || 0), 0);

        document.getElementById('kTotal').innerText = total;
        document.getElementById('kFechadas').innerText = filtered.filter(d => d.status === 'Finalizada').length;
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});
        document.getElementById('kHH').innerText = Math.round(hh) + "h";
        document.getElementById('kAvg').innerText = (custo / total || 0).toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});
        document.getElementById('kHHVal').innerText = (custo / hh || 0).toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});

        renderCharts(filtered);
    }

    function renderCharts(data) {
        Object.values(charts).forEach(c => c.destroy());

        const opt = (clickFn, isHH = false) => ({
            maintainAspectRatio: false,
            plugins: { datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, formatter: v => isHH ? Math.round(v) : v }, legend: { display: false } },
            onClick: (e, activeEls) => { if (activeEls.length > 0) clickFn(e.chart.data.labels[activeEls[0].index]); },
            scales: { y: { ticks: { color: '#aaa', font: {size: 10} }, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { ticks: { color: '#fff', font: {size: 10} } } }
        });

        // 1. Pareto
        const pData = countAndSort(data, "sistema");
        charts.cPareto = new Chart(document.getElementById('cPareto'), { type: 'bar', data: { labels: pData.labels, datasets: [{ data: pData.values, backgroundColor: '#FFD60A' }] }, options: opt(l => openModal(l, "sistema")) });

        // 2. HH Sistema
        const hData = sumAndSort(data, "sistema", "hh");
        charts.cHH = new Chart(document.getElementById('cHH'), { type: 'bar', data: { labels: hData.labels, datasets: [{ data: hData.values, backgroundColor: '#00A8E8' }] }, options: opt(l => openModal(l, "sistema"), true) });

        // 3. Top Custo Equipamento
        const cData = sumAndSort(data, "cod_sec_veiculo", "produtos", 10);
        charts.cCustoEquip = new Chart(document.getElementById('cCustoEquip'), { type: 'bar', data: { labels: cData.labels, datasets: [{ data: cData.values, backgroundColor: '#ef4444' }] }, options: { ...opt(l => openModal(l, "cod_sec_veiculo")), indexAxis: 'y' } });

        // 4. Tendência
        const tData = trend(rawData);
        charts.cTrend = new Chart(document.getElementById('cTrend'), { type: 'line', data: { labels: tData.labels, datasets: [{ label:'OS', data: tData.values, borderColor: '#FFD60A', tension: 0.3, fill: true, backgroundColor: 'rgba(255,214,10,0.1)' }] }, options: opt(() => {}) });

        // 5. Frequência Equipamento
        const eData = countAndSort(data, "cod_sec_veiculo", 10);
        charts.cEquip = new Chart(document.getElementById('cEquip'), { type: 'bar', data: { labels: eData.labels, datasets: [{ data: eData.values, backgroundColor: '#4CC9F0' }] }, options: { ...opt(l => openModal(l, "cod_sec_veiculo")), indexAxis: 'y' } });
    }

    function openModal(val, field) {
        const filtered = rawData.filter(d => String(d[field]) === String(val));
        document.getElementById('modalTitle').innerText = val;
        document.getElementById('modalBody').innerHTML = filtered.map(d => `<tr><td>${d.nro_ordem_servico}</td><td>${new Date(d.data_e_hora_de_inicio).toLocaleDateString()}</td><td>${d.cod_sec_veiculo}</td><td>${d.sistema}</td><td>R$ ${Math.round(d.produtos)}</td><td>${Math.round(d.hh)}h</td><td style="color:${d.status=='Aberta'?'red':'green'}">${d.status}</td></tr>`).join('');
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function sumAndSort(arr, key, sumKey, limit = 99) {
        const map = arr.reduce((acc, d) => { const k = d[key] || "N/A"; acc[k] = (acc[k] || 0) + (d[sumKey] || 0); return acc; }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, limit);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    function countAndSort(arr, key, limit = 99) {
        const map = arr.reduce((acc, d) => { const k = d[key] || "N/A"; acc[k] = (acc[k] || 0) + 1; return acc; }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, limit);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    function trend(arr) {
        const map = arr.reduce((acc, d) => { const m = String(d.data_e_hora_de_inicio).substring(0, 7); if(m.includes('-')) acc[m] = (acc[m] || 0) + 1; return acc; }, {});
        const sorted = Object.entries(map).sort();
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    function exportPDF() {
        const element = document.getElementById('reportArea');
        html2pdf().from(element).set({ margin: 10, filename: 'Relatorio_PCM_SV.pdf', html2canvas: { scale: 2, backgroundColor: '#001D3D' }, jsPDF: { orientation: 'landscape' } }).save();
    }

    init();
</script>
</body>
</html>
