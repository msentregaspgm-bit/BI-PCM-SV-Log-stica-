<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BI PCM SV - Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { --sv-blue-dark: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--sv-blue-dark); color: var(--sv-text); margin: 0; padding: 0; }

        /* Splash Screen */
        #splash { position: fixed; width: 100%; height: 100%; background: var(--sv-blue-dark); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #splash img { width: 200px; margin-bottom: 20px; }

        /* Navbar Mobile */
        .navbar { background: var(--sv-blue-mid); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--sv-yellow); position: sticky; top: 0; z-index: 999; }
        .navbar img { height: 40px; }
        .navbar h2 { font-size: 14px; margin: 0; color: var(--sv-yellow); }

        .main { padding: 10px; }

        /* Filtros Adaptados */
        .filter-section { background: var(--sv-blue-mid); padding: 12px; border-radius: 10px; margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .filter-section input, .filter-section select { width: 100%; background: #001d3d; color: white; border: 1px solid var(--sv-yellow); padding: 10px; border-radius: 6px; font-size: 14px; }
        .filter-section input[type="month"] { grid-column: span 2; }

        /* Balões de KPI Compactos */
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .kpi-card h3 { margin: 0; font-size: 10px; color: var(--sv-yellow); text-transform: uppercase; }
        .kpi-card .value { font-size: 18px; font-weight: 800; margin: 5px 0; color: white; }

        /* Gráficos em Coluna Única no Mobile */
        .charts-container { display: flex; flex-direction: column; gap: 15px; }
        .chart-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .chart-card h4 { margin: 0 0 10px 0; color: var(--sv-yellow); text-transform: uppercase; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .canvas-wrapper { position: relative; height: 280px; width: 100%; }

        /* Modal Dril-down Mobile */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sv-blue-dark); z-index: 10001; padding: 10px; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--sv-yellow); padding-bottom: 10px; }
        .close-btn { background: var(--sv-yellow); color: black; border: none; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
        
        .table-responsive { overflow-x: auto; background: white; border-radius: 8px; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 600px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background: #eee; font-weight: bold; }
    </style>
</head>
<body>

<div id="splash">
    <img src="Logo.png" alt="SV Logística">
    <p style="font-size: 12px; letter-spacing: 2px;">CARREGANDO BI MOBILE...</p>
</div>

<div id="modal">
    <div class="modal-header">
        <h3 id="modalTitle" style="margin:0; font-size:16px;">Detalhes</h3>
        <button class="close-btn" onclick="closeModal()">FECHAR</button>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr><th>OS</th><th>Data</th><th>Prefixo</th><th>Sistema</th><th>Valor</th><th>HH</th><th>Status</th></tr>
            </thead>
            <tbody id="modalBody"></tbody>
        </table>
    </div>
</div>

<div class="navbar">
    <img src="Logo.png" alt="Logo SV">
    <h2>PCM INTELLIGENCE</h2>
</div>

<div class="main">
    <div class="filter-section">
        <input type="month" id="fData" onchange="updateDashboard()">
        <select id="fManut" onchange="updateDashboard()">
            <option value="">Manutenção</option>
            <option value="Corretiva">Corretiva</option>
            <option value="Preventiva">Preventiva</option>
        </select>
        <select id="fStatus" onchange="updateDashboard()">
            <option value="">Status</option>
            <option value="Finalizada">Fechadas</option>
            <option value="Aberta">Abertas</option>
        </select>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>TOTAL OS</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card"><h3>INVESTIMENTO</h3><div class="value" id="kCusto">R$ 0</div></div>
        <div class="kpi-card"><h3>TOTAL HH</h3><div class="value" id="kHH">0h</div></div>
        <div class="kpi-card"><h3>CUSTO MÉDIO</h3><div class="value" id="kAvg">R$ 0</div></div>
    </div>

    <div class="charts-container">
        <div class="chart-card">
            <h4>Pareto: OS por Sistema</h4>
            <div class="canvas-wrapper"><canvas id="cPareto"></canvas></div>
        </div>
        <div class="chart-card">
            <h4>Acumulado HH / Sistema</h4>
            <div class="canvas-wrapper"><canvas id="cHH"></canvas></div>
        </div>
        <div class="chart-card">
            <h4>Top 10 Equipamentos</h4>
            <div class="canvas-wrapper"><canvas id="cEquip"></canvas></div>
        </div>
        <div class="chart-card">
            <h4>Prioridade de Atendimento</h4>
            <div class="canvas-wrapper"><canvas id="cPrio"></canvas></div>
        </div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyzjdFWktvrqmuWfYSsuc5_qQ8Qx0JcWDKkrE-Z3Fi5Bd2WR-4-HgCNSR1tfE1bil4_GQ/exec";
    let rawData = [];
    let currentFiltered = [];
    let charts = {};

    Chart.register(ChartDataLabels);

    async function init() {
        try {
            const res = await fetch(URL_API);
            rawData = await res.json();
            document.getElementById('splash').style.display = 'none';
            updateDashboard();
        } catch (e) { alert("Erro de conexão!"); }
    }

    function updateDashboard() {
        const valData = document.getElementById('fData').value;
        const valManut = document.getElementById('fManut').value;
        const valStatus = document.getElementById('fStatus').value;

        currentFiltered = rawData.filter(d => {
            let dMatch = valData ? String(d.data_e_hora_de_inicio).includes(valData) : true;
            let mMatch = valManut ? d.manutencao === valManut : true;
            let sMatch = valStatus ? d.status === valStatus : true;
            return dMatch && mMatch && sMatch;
        });

        const total = currentFiltered.length;
        const custo = currentFiltered.reduce((acc, d) => acc + (d.produtos || 0), 0);

        document.getElementById('kTotal').innerText = total;
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});
        document.getElementById('kHH').innerText = currentFiltered.reduce((acc, d) => acc + (d.hh || 0), 0).toFixed(1) + "h";
        document.getElementById('kAvg').innerText = (custo / total || 0).toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});

        renderCharts(currentFiltered);
    }

    function renderCharts(data) {
        Object.values(charts).forEach(c => c.destroy());

        const baseOpt = (clickFn) => ({
            maintainAspectRatio: false,
            plugins: { 
                datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, anchor: 'end', align: 'top' },
                legend: { display: false }
            },
            onClick: (e, activeEls) => {
                if (activeEls.length > 0) {
                    const idx = activeEls[0].index;
                    const label = e.chart.data.labels[idx];
                    clickFn(label);
                }
            },
            scales: { 
                y: { ticks: { color: '#aaa', font: {size: 10} }, grid: { display: false } },
                x: { ticks: { color: '#fff', font: {size: 10} }, grid: { display: false } }
            }
        });

        // 1. Pareto
        const pData = countAndSort(data, "sistema");
        charts.cPareto = new Chart(document.getElementById('cPareto'), {
            type: 'bar',
            data: { labels: pData.labels, datasets: [{ data: pData.values, backgroundColor: '#FFD60A' }] },
            options: baseOpt(lbl => openDetails(lbl, "sistema"))
        });

        // 2. HH
        const hData = sumAndSort(data, "sistema", "hh");
        charts.cHH = new Chart(document.getElementById('cHH'), {
            type: 'bar',
            data: { labels: hData.labels, datasets: [{ data: hData.values, backgroundColor: '#00A8E8' }] },
            options: baseOpt(lbl => openDetails(lbl, "sistema"))
        });

        // 3. Top 10
        const eData = countAndSort(data, "cod_sec_veiculo", 10);
        charts.cEquip = new Chart(document.getElementById('cEquip'), {
            type: 'bar',
            data: { labels: eData.labels, datasets: [{ data: eData.values, backgroundColor: '#4CC9F0' }] },
            options: { ...baseOpt(lbl => openDetails(lbl, "cod_sec_veiculo")), indexAxis: 'y' }
        });

        // 4. Prioridade
        const prio = countAndSort(data, "prioridade");
        charts.cPrio = new Chart(document.getElementById('cPrio'), {
            type: 'bar',
            data: { labels: prio.labels, datasets: [{ data: prio.values, backgroundColor: '#F72585' }] },
            options: { ...baseOpt(lbl => openDetails(lbl, "prioridade")), indexAxis: 'y' }
        });
    }

    function openDetails(val, field) {
        const filtered = currentFiltered.filter(d => String(d[field]) === String(val));
        document.getElementById('modalTitle').innerText = val;
        document.getElementById('modalBody').innerHTML = filtered.map(d => `
            <tr>
                <td>${d.nro_ordem_servico}</td>
                <td>${new Date(d.data_e_hora_de_inicio).toLocaleDateString('pt-br')}</td>
                <td>${d.cod_sec_veiculo}</td>
                <td>${d.sistema}</td>
                <td>R$ ${Math.round(d.produtos || 0)}</td>
                <td>${(d.hh || 0).toFixed(1)}h</td>
                <td style="color:${d.status === 'Aberta' ? 'red' : 'green'}">${d.status}</td>
            </tr>
        `).join('');
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function sumAndSort(arr, key, sumKey) {
        const map = arr.reduce((acc, d) => { const k = d[key] || "N/A"; acc[k] = (acc[k] || 0) + (d[sumKey] || 0); return acc; }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    function countAndSort(arr, key, limit = 99) {
        const map = arr.reduce((acc, d) => { const k = d[key] || "N/A"; acc[k] = (acc[k] || 0) + 1; return acc; }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, limit);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    init();
</script>
</body>
</html>
