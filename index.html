<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV MASTER - Sistema Total</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --sv-blue: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue); color: var(--sv-text); margin: 0; padding: 0; overflow-x: hidden; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sv-blue); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        #splash img { width: 180px; animation: entrance 1.2s ease-out forwards; }
        @keyframes entrance { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #screen-home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .logo-home { width: 220px; margin-bottom: 40px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; }
        .menu-card { background: var(--sv-blue-mid); border: 2px solid var(--sv-yellow); padding: 30px; border-radius: 20px; cursor: pointer; text-align: center; }
        .menu-card h2 { margin: 10px 0; font-size: 1.2rem; text-transform: uppercase; color: var(--sv-yellow); }

        .navbar { background: var(--sv-blue-mid); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--sv-yellow); position: sticky; top: 0; z-index: 999; }
        .navbar img { height: 35px; }
        .btn-voltar { background: var(--sv-yellow); border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; color: var(--sv-blue); }

        .screen { display: none; padding: 15px; max-width: 1400px; margin: auto; padding-bottom: 80px; }
        .active { display: block; }

        /* Filtros BI */
        .filter-section { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; border: 1px solid rgba(255,255,255,0.1); }
        select, input { background: #001d3d; color: white; border: 1px solid var(--sv-yellow); padding: 10px; border-radius: 6px; font-size: 14px; width: 100%; }

        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        @media (min-width: 768px) { .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); } }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); }
        .kpi-card h3 { margin: 0; font-size: 9px; color: var(--sv-yellow); text-transform: uppercase; }
        .kpi-card .value { font-size: 18px; font-weight: 800; margin: 5px 0; color: white; }

        .chart-card { background: var(--sv-blue-mid); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .chart-card h4 { margin: 0 0 15px 0; color: var(--sv-yellow); font-size: 12px; text-transform: uppercase; }
        .canvas-wrapper { position: relative; height: 300px; width: 100%; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; padding: 15px; overflow-y: auto; }
        .modal-content { background: white; color: #333; border-radius: 12px; padding: 20px; }
        
        .category-block { background: var(--sv-blue-mid); border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--sv-yellow); overflow: hidden; }
        .category-title { background: var(--sv-yellow); color: var(--sv-blue); font-weight: 800; padding: 10px; font-size: 12px; }
        .item-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="splash"><img src="Logo.png" alt="SV Logística"></div>

<div id="screen-home" class="active">
    <img src="Logo.png" class="logo-home">
    <div class="menu-grid">
        <div class="menu-card" onclick="showScreen('checklist')"><h2>Checklist Frota</h2></div>
        <div class="menu-card" onclick="showScreen('bi')"><h2>Gestão BI (PCM)</h2></div>
    </div>
</div>

<div id="screen-checklist" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="location.reload()">INÍCIO</button></div>
    <div style="max-width: 500px; margin: auto; padding-top: 20px;">
        <label>Operador</label><input type="text" id="operador">
        <label>Tipo da Máquina</label><select id="tipoMaquina" onchange="filtraIDs()"></select>
        <label>ID da Máquina</label><select id="idMaquina"></select>
        <button onclick="irParaChecklist()" class="btn-voltar" style="width:100%; padding:15px; margin-top:10px;">INICIAR</button>
        <button onclick="showScreen('dash-check')" class="btn-voltar" style="width:100%; padding:15px; margin-top:20px; background:#444; color:white;">INDICADORES</button>
    </div>
</div>

<div id="screen-exec" class="screen">
    <div id="banner" style="text-align:center; padding:15px; font-weight:bold; color:var(--sv-yellow);"></div>
    <div id="checklistArea"></div>
    <textarea id="obs" placeholder="Observações..." style="width:100%; height:80px; background:#001d3d; color:white; border:1px solid var(--sv-yellow); border-radius:8px; padding:10px;"></textarea>
    <button id="btnSalvar" onclick="salvarChecklist()" style="width:100%; background:var(--sv-yellow); border:none; padding:20px; border-radius:10px; font-weight:800; margin-top:15px;">ENVIAR</button>
</div>

<div id="screen-bi" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="location.reload()">INÍCIO</button></div>
    
    <div class="filter-section" style="margin-top:20px;">
        <input type="month" id="fDataBI">
        <select id="fManutBI"><option value="">Todas Manutenções</option><option value="Corretiva">Corretiva</option><option value="Preventiva">Preventiva</option></select>
        <select id="fStatusBI"><option value="">Todos Status</option><option value="Finalizada">Finalizada</option><option value="Aberta">Aberta</option></select>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>Total OS</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card"><h3>Abertas</h3><div class="value" id="kAbertas">0</div></div>
        <div class="kpi-card"><h3>Custo Peças</h3><div class="value" id="kCusto">R$ 0</div></div>
        <div class="kpi-card"><h3>HH Total</h3><div class="value" id="kHH">0h</div></div>
    </div>

    <div id="pdfArea">
        <div class="chart-card"><h4>Volume OS / Sistema</h4><div class="canvas-wrapper"><canvas id="cPareto"></canvas></div></div>
        <div class="chart-card"><h4>HH / Sistema</h4><div class="canvas-wrapper"><canvas id="cHH"></canvas></div></div>
        <div class="chart-card"><h4>Top Custo Equipamento</h4><div class="canvas-wrapper"><canvas id="cCustoEquip"></canvas></div></div>
        <div class="chart-card"><h4>Tendência Mensal</h4><div class="canvas-wrapper"><canvas id="cTrend"></canvas></div></div>
        <div class="chart-card"><h4>Top 10 Frequência</h4><div class="canvas-wrapper"><canvas id="cEquipFreq"></canvas></div></div>
        <div class="chart-card"><h4>HH Sistema (Horiz)</h4><div class="canvas-wrapper"><canvas id="cHHHoriz"></canvas></div></div>
        <div class="chart-card"><h4>Distribuição %</h4><div class="canvas-wrapper"><canvas id="cPizzaBI"></canvas></div></div>
    </div>
</div>

<div id="screen-dash-check" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="showScreen('checklist')">VOLTAR</button></div>
    <div class="chart-card" style="margin-top:20px;"><h4>Status OK x NOK</h4><canvas id="chartPizzaCheck"></canvas></div>
</div>

<div id="modal">
    <div class="modal-content">
        <button onclick="closeModal()" style="float:right;">X</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const URL_CHECKLIST = "https://script.google.com/macros/s/AKfycbxXLqXBs3Of8h2TE1I2B61NfcJVONzHe45wGpzRaXlHdSAnBsdrZ67aALUjiN3DVj1z/exec";
    const URL_BI = "https://script.google.com/macros/s/AKfycbyzjdFWktvrqmuWfYSsuc5_qQ8Qx0JcWDKkrE-Z3Fi5Bd2WR-4-HgCNSR1tfE1bil4_GQ/exec";

    let rawBI = [], dHistorico = [], dMaquinas = [], dItens = [], charts = {};
    Chart.register(ChartDataLabels);

    window.onload = async () => {
        const resC = await fetch(URL_CHECKLIST); const dataC = await resC.json();
        dMaquinas = dataC.maquinas; dItens = dataC.itens; dHistorico = dataC.historico;
        const selT = document.getElementById('tipoMaquina');
        selT.innerHTML = '<option value="">Tipo...</option>';
        [...new Set(dMaquinas.map(m => m.tipo_maquina))].forEach(t => selT.innerHTML += `<option value="${t}">${t}</option>`);
        
        // Ativar escuta dos filtros BI ANTES de carregar
        ['fDataBI', 'fManutBI', 'fStatusBI'].forEach(id => {
            document.getElementById(id).addEventListener('change', updateBI);
        });

        document.getElementById('splash').style.display = 'none';
    };

    function showScreen(id) {
        document.querySelectorAll('.screen, #screen-home').forEach(s => s.style.display = 'none');
        document.getElementById('screen-' + id).style.display = 'block';
        if(id === 'bi') loadBI();
        if(id === 'dash-check') renderDashCheck();
    }

    async function loadBI() {
        if(rawBI.length === 0) {
            const res = await fetch(URL_BI);
            rawBI = await res.json();
        }
        updateBI();
    }

    function updateBI() {
        const fD = document.getElementById('fDataBI').value;
        const fM = document.getElementById('fManutBI').value;
        const fS = document.getElementById('fStatusBI').value;

        const filtered = rawBI.filter(d => {
            return (fD ? String(d.data_e_hora_de_inicio).includes(fD) : true) &&
                   (fM ? d.manutencao === fM : true) &&
                   (fS ? d.status === fS : true);
        });

        // Atualizar Balões
        document.getElementById('kTotal').innerText = filtered.length;
        document.getElementById('kAbertas').innerText = filtered.filter(x => x.status === 'Aberta').length;
        const custo = filtered.reduce((a, b) => a + (b.produtos || 0), 0);
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br', {style:'currency', currency:'BRL', maximumFractionDigits:0});
        document.getElementById('kHH').innerText = Math.round(filtered.reduce((a, b) => a + (b.hh || 0), 0)) + "h";

        renderAllCharts(filtered);
    }

    function renderAllCharts(data) {
        // ESSA É A PARTE CRÍTICA: Destruir e recriar com os NOVOS dados
        const chartIds = ['cPareto', 'cHH', 'cTrend', 'cCustoEquip', 'cEquipFreq', 'cHHHoriz', 'cPizzaBI'];
        chartIds.forEach(id => { if(charts[id]) charts[id].destroy(); });

        const cfg = (m = false) => ({
            maintainAspectRatio: false,
            plugins: { datalabels: { color: '#fff', font:{weight:'bold'}, formatter: v => m ? 'R$ '+Math.round(v) : Math.round(v) }, legend:{display:false} },
            scales: { y:{ ticks:{color:'#aaa', font:{size:9}} }, x:{ ticks:{color:'#fff', font:{size:9}} } }
        });

        charts.cPareto = new Chart(document.getElementById('cPareto'), { type:'bar', data:{ labels:sort(data,"sistema","count").l, datasets:[{data:sort(data,"sistema","count").v, backgroundColor:'#FFD60A'}] }, options:cfg() });
        charts.cHH = new Chart(document.getElementById('cHH'), { type:'bar', data:{ labels:sort(data,"sistema","sum","hh").l, datasets:[{data:sort(data,"sistema","sum","hh").v, backgroundColor:'#00A8E8'}] }, options:cfg() });
        charts.cTrend = new Chart(document.getElementById('cTrend'), { type:'line', data:{ labels:trend(data).l, datasets:[{data:trend(data).v, borderColor:'#FFD60A', fill:true, backgroundColor:'rgba(255,214,10,0.1)'}] }, options:cfg() });
        charts.cCustoEquip = new Chart(document.getElementById('cCustoEquip'), { type:'bar', data:{ labels:sort(data,"cod_sec_veiculo","sum","produtos",10).l, datasets:[{data:sort(data,"cod_sec_veiculo","sum","produtos",10).v, backgroundColor:'#ef4444'}] }, options:{...cfg(true), indexAxis:'y'} });
        charts.cEquipFreq = new Chart(document.getElementById('cEquipFreq'), { type:'bar', data:{ labels:sort(data,"cod_sec_veiculo","count",10).l, datasets:[{data:sort(data,"cod_sec_veiculo","count",10).v, backgroundColor:'#4CC9F0'}] }, options:{...cfg(), indexAxis:'y'} });
        charts.cHHHoriz = new Chart(document.getElementById('cHHHoriz'), { type:'bar', data:{ labels:sort(data,"sistema","sum","hh").l, datasets:[{data:sort(data,"sistema","sum","hh").v, backgroundColor:'#7209B7'}] }, options:{...cfg(), indexAxis:'y'} });
        charts.cPizzaBI = new Chart(document.getElementById('cPizzaBI'), { type:'pie', data:{ labels:sort(data,"sistema","count").l, datasets:[{data:sort(data,"sistema","count").v, backgroundColor:['#FFD60A','#00A8E8','#4CC9F0','#7209B7']}] }, options:{ maintainAspectRatio:false, plugins:{legend:{position:'right',labels:{color:'#fff', font:{size:8}}}} } });
    }

    // Funções de Checklist
    function filtraIDs() {
        const t = document.getElementById('tipoMaquina').value; const s = document.getElementById('idMaquina');
        s.innerHTML = ''; dMaquinas.filter(m => m.tipo_maquina === t).forEach(m => s.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`);
    }
    function irParaChecklist() {
        const id = document.getElementById('idMaquina').value; const t = document.getElementById('tipoMaquina').value;
        const itensF = dItens.filter(i => i.tipo_maquina.trim().toLowerCase() === t.trim().toLowerCase());
        const area = document.getElementById('checklistArea'); area.innerHTML = "";
        [...new Set(itensF.map(i => i.categoria))].forEach(c => {
            let h = `<div class="category-block"><div class="category-title">${c}</div>`;
            itensF.filter(i => i.categoria === c).forEach(it => {
                h += `<div class="item-row"><span>${it.item}</span><select class="res-check" data-name="${it.item}"><option value="OK">OK</option><option value="NOK">NOK</option></select></div>`;
            });
            area.innerHTML += h + `</div>`;
        });
        showScreen('exec');
    }
    async function salvarChecklist() {
        const btn = document.getElementById('btnSalvar'); btn.disabled = true;
        const resps = Array.from(document.querySelectorAll('.res-check')).map(s => ({ item: s.dataset.name, status: s.value }));
        const payload = { operador: document.getElementById('operador').value, idMaquina: document.getElementById('idMaquina').value, respostas: resps };
        await fetch(URL_CHECKLIST, { method:'POST', mode:'no-cors', body:JSON.stringify(payload) });
        alert("Enviado!"); location.reload();
    }

    function renderDashCheck() {
        let ok = 0, nok = 0; dHistorico.forEach(f => { if(f.status === "OK") ok++; else nok++; });
        if(charts.cPCheck) charts.cPCheck.destroy();
        charts.cPCheck = new Chart(document.getElementById('chartPizzaCheck'), { type:'pie', data:{ labels:['OK','NOK'], datasets:[{data:[ok,nok], backgroundColor:['#28a745','#d32f2f']}] }});
    }

    // Utilitários de Ordenação e Dados
    function sort(arr, k, type, sK, l=99) {
        const m = arr.reduce((acc, d) => { const x = d[k] || "N/A"; acc[x] = (acc[x] || 0) + (type==="sum" ? (d[sK]||0) : 1); return acc; }, {});
        const sorted = Object.entries(m).sort((a,b) => b[1] - a[1]).slice(0, l);
        return { l: sorted.map(x=>x[0]), v: sorted.map(x=>x[1]) };
    }
    function trend(arr) {
        const m = arr.reduce((acc, d) => { const x = String(d.data_e_hora_de_inicio).substring(0, 7); if(x.includes('-')) acc[x] = (acc[x] || 0) + 1; return acc; }, {});
        const s = Object.entries(m).sort(); return { l: s.map(x=>x[0]), v: s.map(x=>x[1]) };
    }
</script>
</body>
</html>
