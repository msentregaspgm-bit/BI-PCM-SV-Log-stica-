<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI PCM - SV Logística</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --sv-blue: #002D5E; --sv-yellow: #FFD700; --bg: #F0F2F5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #splash { position: fixed; width: 100%; height: 100%; background: var(--sv-blue); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        #splash img { width: 300px; }
        .navbar { background: var(--sv-blue); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; border-bottom: 4px solid var(--sv-yellow); }
        .main { padding: 20px; max-width: 1500px; margin: auto; }
        .filter-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 5px solid var(--sv-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .kpi-card .value { font-size: 26px; font-weight: 800; color: var(--sv-blue); margin: 8px 0; }
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; }
        .chart-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 420px; }
        .chart-card h4 { margin: 0 0 15px 0; color: var(--sv-blue); text-transform: uppercase; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="splash"><img src="https://i.imgur.com/eO6aLIm.png" alt="Logo SV"></div>

<div class="navbar">
    <div style="display:flex; align-items:center; gap:20px;">
        <img src="https://i.imgur.com/eO6aLIm.png" height="50">
        <h2 style="margin:0">PCM INTELLIGENCE - SV LOGÍSTICA</h2>
    </div>
</div>

<div class="main">
    <div class="filter-section">
        <input type="month" id="fData" onchange="updateDashboard()" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
        <select id="fManut" onchange="updateDashboard()" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
            <option value="">Manutenção: Todas</option>
            <option value="Corretiva">Corretiva</option>
            <option value="Preventiva">Preventiva</option>
        </select>
        <select id="fStatus" onchange="updateDashboard()" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
            <option value="">Status: Todos</option>
            <option value="Finalizada">Finalizada</option>
            <option value="Aberta">Aberta</option>
        </select>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>TOTAL OS</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card"><h3>ABERTAS</h3><div class="value" id="kAbertas" style="color:#e74c3c">0</div></div>
        <div class="kpi-card"><h3>FECHADAS</h3><div class="value" id="kFechadas" style="color:#27ae60">0</div></div>
        <div class="kpi-card"><h3>CUSTO PEÇAS</h3><div class="value" id="kCusto">R$ 0</div></div>
        <div class="kpi-card"><h3>TOTAL HH</h3><div class="value" id="kHH">0.0</div></div>
    </div>

    <div class="charts-container">
        <div class="chart-card"><h4>HH Mensal por Sistema</h4><canvas id="cHH"></canvas></div>
        <div class="chart-card"><h4>Ranking de Prioridade OC</h4><canvas id="cPrio"></canvas></div>
        <div class="chart-card"><h4>Top 10 Equipamentos (Mais OC)</h4><canvas id="cEquip"></canvas></div>
        <div class="chart-card"><h4>HH por Centro de Custo</h4><canvas id="cHHCC"></canvas></div>
        <div class="chart-card"><h4>% Sistemas por OS</h4><canvas id="cPizza"></canvas></div>
    </div>
</div>

<script>
    const URL_API = "https://script.google.com/macros/s/AKfycbyeaYipB1bTMpHavvUykztQQJ8g3jQ2c1jeVsM2l4h0ieAAxx4i6RXvJYVHLeYoA1QOog/exec"; // ⚠️ INSIRA SUA URL DO SCRIPT AQUI
    let rawData = [];
    let charts = {};

    async function init() {
        try {
            const res = await fetch(URL_API);
            rawData = await res.json();
            document.getElementById('splash').style.display = 'none';
            updateDashboard();
        } catch (e) { console.error(e); }
    }

    function updateDashboard() {
        const valData = document.getElementById('fData').value;
        const valManut = document.getElementById('fManut').value;
        const valStatus = document.getElementById('fStatus').value;

        const data = rawData.filter(d => {
            let dateMatch = valData ? String(d.data_e_hora_de_inicio).includes(valData) : true;
            let manutMatch = valManut ? d.manutencao === valManut : true;
            let statusMatch = valStatus ? d.status === valStatus : true;
            return dateMatch && manutMatch && statusMatch;
        });

        // Balões
        const total = data.length;
        const abertas = data.filter(d => d.status === 'Aberta').length;
        const fechadas = data.filter(d => d.status === 'Finalizada').length;
        const custo = data.reduce((acc, d) => acc + (d.produtos || 0), 0);
        const hh = data.reduce((acc, d) => acc + (d.hh || 0), 0);

        document.getElementById('kTotal').innerText = total;
        document.getElementById('kAbertas').innerText = abertas;
        document.getElementById('kFechadas').innerText = fechadas;
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
        document.getElementById('kHH').innerText = hh.toFixed(1);

        renderCharts(data);
    }

    function renderCharts(data) {
        Object.values(charts).forEach(c => c.destroy());

        // Gráfico 1: HH Mensal por Sistema (Vertical + Sort)
        const sistSum = sumAndSort(data, "sistema", "hh");
        charts.cHH = new Chart(document.getElementById('cHH'), {
            type: 'bar',
            data: { labels: sistSum.labels, datasets: [{ label: 'Horas', data: sistSum.values, backgroundColor: '#005697' }] }
        });

        // Gráfico 2: Prioridade (Horizontal + Sort)
        const prioCount = countAndSort(data, "prioridade");
        charts.cPrio = new Chart(document.getElementById('cPrio'), {
            type: 'bar',
            options: { indexAxis: 'y' },
            data: { labels: prioCount.labels, datasets: [{ label: 'Qtd OC', data: prioCount.values, backgroundColor: '#FFD700' }] }
        });

        // Gráfico 3: Top 10 Equipamentos (Escala Ajustada)
        const equipCount = countAndSort(data, "cod_sec_veiculo", 10);
        charts.cEquip = new Chart(document.getElementById('cEquip'), {
            type: 'bar',
            options: { 
                indexAxis: 'y',
                maintainAspectRatio: false,
                scales: { y: { ticks: { autoSkip: false, font: { size: 10 } } } } 
            },
            data: { labels: equipCount.labels, datasets: [{ label: 'OCs', data: equipCount.values, backgroundColor: '#002D5E' }] }
        });

        // Gráfico 4: HH por Centro de Custo
        const ccHH = sumAndSort(data, "centro_resultado", "hh");
        charts.cHHCC = new Chart(document.getElementById('cHHCC'), {
            type: 'bar',
            options: { indexAxis: 'y' },
            data: { labels: ccHH.labels, datasets: [{ label: 'HH Total', data: ccHH.values, backgroundColor: '#005697' }] }
        });

        // Gráfico 5: % Sistemas por OS (Pizza)
        const sistPizza = countAndSort(data, "sistema");
        charts.cPizza = new Chart(document.getElementById('cPizza'), {
            type: 'pie',
            data: { labels: sistPizza.labels, datasets: [{ data: sistPizza.values, backgroundColor: ['#002D5E', '#005697', '#FFD700', '#e74c3c', '#2ecc71', '#9b59b6'] }] }
        });
    }

    // Funções de Processamento
    function sumAndSort(arr, key, sumKey) {
        const map = arr.reduce((acc, d) => {
            const k = d[key] || "N/A";
            acc[k] = (acc[k] || 0) + (d[sumKey] || 0);
            return acc;
        }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    function countAndSort(arr, key, limit = 99) {
        const map = arr.reduce((acc, d) => {
            const k = d[key] || "N/A";
            acc[k] = (acc[k] || 0) + 1;
            return acc;
        }, {});
        const sorted = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0, limit);
        return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
    }

    init();
</script>
</body>
</html>
