<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI PCM SV LOGÍSTICA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #005697; --yellow: #FDB813; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        #status-box { background: #fff; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 100px auto; }
        .container { max-width: 1200px; margin: auto; display: none; }
        .header { background: var(--blue); color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-left: 10px solid var(--yellow); }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .value { font-size: 2.2rem; font-weight: 800; color: var(--blue); margin-top: 10px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 25px; }
        .chart-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .error-msg { color: #d32f2f; background: #ffebee; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; font-size: 14px; text-align: left; }
    </style>
</head>
<body>

    <div id="status-box">
        <img src="logo.png" style="width:120px; margin-bottom:20px;" onerror="this.style.display='none'">
        <div id="status-text">🔄 Conectando ao Banco de Dados PCM...</div>
        <div id="error-details" class="error-msg"></div>
    </div>

    <div class="container" id="app">
        <div class="header">
            <h1 style="margin:0; font-size: 1.5rem;">PORTAL BI PCM SV LOGÍSTICA</h1>
            <button onclick="location.reload()" style="background:var(--yellow); border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">ATUALIZAR</button>
        </div>

        <div class="kpi-grid">
            <div class="card"><h3>Total OS</h3><div id="kTotal" class="value">0</div></div>
            <div class="card"><h3>OS Abertas</h3><div id="kAbertas" class="value" style="color:#f44336">0</div></div>
            <div class="card"><h3>Investimento Peças</h3><div id="kCusto" class="value" style="color:#4caf50">R$ 0</div></div>
            <div class="card"><h3>OS Prioridade 1</h3><div id="kAlta" class="value">0</div></div>
        </div>

        <div class="chart-grid">
            <div class="chart-box"><h4>Ranking de Falhas por Sistema</h4><canvas id="chartSist" height="300"></canvas></div>
            <div class="chart-box"><h4>Tipo de Manutenção</h4><canvas id="chartMix" height="300"></canvas></div>
        </div>
    </div>

<script>
    // ⚠️ COLOQUE O SEU LINK NOVO ABAIXO
    const URL_API = "https://script.google.com/macros/s/AKfycbxRu0r-AxT2Lke5Z--UEjxkOWsv3mtOsGQkU8n_yDZbgXo8rgzUz7Uw9jEASmXpFuda0w/exec";

    async function fetchData() {
        const statusText = document.getElementById('status-text');
        const errorDetails = document.getElementById('error-details');
        
        try {
            // Adicionamos um número aleatório no fim da URL para "matar" o cache do navegador
            const cacheBuster = URL_API + (URL_API.includes('?') ? '&' : '?') + 't=' + Date.now();
            
            const response = await fetch(cacheBuster);
            if (!response.ok) throw new Error("O Google não respondeu corretamente (Erro " + response.status + ")");
            
            const data = await response.json();
            if (data.error) throw new Error("Erro na Planilha: " + data.error);

            // Se chegou aqui, deu certo
            document.getElementById('status-box').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            render(data);

        } catch (e) {
            statusText.innerText = "❌ Falha na Conexão";
            errorDetails.style.display = 'block';
            errorDetails.innerHTML = "<b>Detalhes do Erro:</b><br>" + e.message + "<br><br><b>O que fazer?</b><br>1. Verifique se o link da API está correto.<br>2. Certifique-se que a implantação no Google está como 'Qualquer Pessoa'.";
        }
    }

    function render(dados) {
        const abertas = dados.filter(o => String(o.status).toLowerCase().includes('aberta')).length;
        const alta = dados.filter(o => String(o.prioridade).includes('1')).length;
        const custo = dados.reduce((acc, o) => acc + (parseFloat(o.produtos) || 0), 0);

        document.getElementById('kTotal').innerText = dados.length;
        document.getElementById('kAbertas').innerText = abertas;
        document.getElementById('kAlta').innerText = alta;
        document.getElementById('kCusto').innerText = custo.toLocaleString('pt-br', {style:'currency', currency:'BRL'});

        // Gráfico Sistemas
        const sMap = {}; 
        dados.forEach(o => { const s = o.sistema || "Geral"; sMap[s] = (sMap[s] || 0) + 1; });
        const labels = Object.entries(sMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
        
        new Chart(document.getElementById('chartSist'), {
            type: 'bar',
            data: { labels: labels.map(l=>l[0]), datasets:[{ label:'Qtd OS', data:labels.map(l=>l[1]), backgroundColor:'#005697'}] },
            options: { indexAxis: 'y', plugins: { legend: {display:false} } }
        });

        // Gráfico Mix
        const tMap = {}; 
        dados.forEach(o => { const t = o.manutencao || "Outros"; tMap[t] = (tMap[t] || 0) + 1; });
        new Chart(document.getElementById('chartMix'), {
            type: 'pie',
            data: { labels: Object.keys(tMap), datasets:[{ data: Object.values(tMap), backgroundColor: ['#005697','#FDB813','#f44336','#4caf50','#9c27b0'] }] }
        });
    }

    fetchData();
</script>
</body>
</html>
